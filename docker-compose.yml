services:
  redis:
    image: redis:7-alpine
    container_name: medical_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: medical_db
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_DB: ${DB_NAME:-plateforme_medicale}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nis123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: medical_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db  # Très important : ici on pointe vers le service "db" et non localhost
      - DB_PORT=5432
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:7b-instruct
      - OLLAMA_PREPROCESS_MODEL=qwen2.5:7b-instruct
      - OLLAMA_FALLBACK_MODEL=qwen2.5:3b-instruct
      - OLLAMA_TIMEOUT_SECONDS=420
      - OLLAMA_PRIMARY_TIMEOUT_SECONDS=180
      - OLLAMA_FALLBACK_TIMEOUT_SECONDS=240
      - OLLAMA_NUM_PREDICT=32
      - OLLAMA_RETRY_NUM_PREDICT=24
      - OLLAMA_MAX_COLUMNS=40
      - OLLAMA_PREVIEW_ROWS=3
      - OLLAMA_RETRY_MAX_COLUMNS=20
      - OLLAMA_RETRY_PREVIEW_ROWS=2
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - ollama
      - redis
    restart: unless-stopped

  audit_cleanup:
    build:
      context: ./backend
    container_name: medical_audit_cleanup
    command: sh -c "while true; do python manage.py cleanup_audit_logs --days 15; sleep 86400; done"
    volumes:
      - ./backend:/app
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    env_file:
      - ./backend/.env
    depends_on:
      - db
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend
    container_name: medical_celery_worker
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:7b-instruct
      - OLLAMA_PREPROCESS_MODEL=qwen2.5:7b-instruct
      - OLLAMA_FALLBACK_MODEL=qwen2.5:3b-instruct
      - OLLAMA_TIMEOUT_SECONDS=420
      - OLLAMA_PRIMARY_TIMEOUT_SECONDS=180
      - OLLAMA_FALLBACK_TIMEOUT_SECONDS=240
      - OLLAMA_NUM_PREDICT=32
      - OLLAMA_RETRY_NUM_PREDICT=24
      - OLLAMA_MAX_COLUMNS=40
      - OLLAMA_PREVIEW_ROWS=3
      - OLLAMA_RETRY_MAX_COLUMNS=20
      - OLLAMA_RETRY_PREVIEW_ROWS=2
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - db
      - ollama
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medical_frontend
    command: sh -c "npm install && npm start"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Protège les modules node locaux contre l'écrasement
    ports:
      - "3000:3000"
    environment:
      - WATCHPACK_POLLING=true # Pour le rechargement à chaud sur Windows
      - REACT_APP_API_URL=http://localhost:8000/api/
    depends_on:
      - backend
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: medical_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
  redis_data: