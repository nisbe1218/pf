services:
  redis:
    image: redis:7-alpine
    container_name: medical_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - medical_network

  db:
    image: postgres:16
    container_name: medical_db
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_DB: ${DB_NAME:-plateforme_medicale}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nis123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - medical_network

  backend:
    build:
      context: ./backend
    container_name: medical_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - OLLAMA_BASE_URL=http://medical_ollama:11434
      - OLLAMA_MODEL=qwen2.5:7b
      - EMBEDDING_MODEL=nomic-embed-text
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - ollama
      - redis
    restart: unless-stopped
    networks:
      - medical_network

  audit_cleanup:
    build:
      context: ./backend
    container_name: medical_audit_cleanup
    command: sh -c "while true; do python manage.py cleanup_audit_logs --days 15; sleep 86400; done"
    volumes:
      - ./backend:/app
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    env_file:
      - ./backend/.env
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - medical_network

  celery-worker:
    build:
      context: ./backend
    container_name: medical_celery_worker
    command: celery -A config worker -l info -c 2
    volumes:
      - ./backend:/app
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://medical_ollama:11434
      - OLLAMA_MODEL=qwen2.5:7b
      - EMBEDDING_MODEL=nomic-embed-text
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - db
      - ollama
    restart: unless-stopped
    networks:
      - medical_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medical_frontend
    command: sh -c "npm install && npm start"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - WATCHPACK_POLLING=true
      - REACT_APP_API_URL=http://localhost:8000/api/
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - medical_network

  ollama:
    image: ollama/ollama:latest
    container_name: medical_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    command: serve
    restart: unless-stopped
    networks:
      - medical_network

networks:
  medical_network:
    driver: bridge

volumes:
  ollama_data:
  postgres_data:
  redis_data: