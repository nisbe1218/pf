version: '3.9'

# Override services to add preprocess_tmp volume
services:
  backend:
    volumes:
      - ./backend:/app
      - preprocess_tmp:/tmp/preprocess
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

  celery-worker:
    volumes:
      - ./backend:/app
      - preprocess_tmp:/tmp/preprocess
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

volumes:
  preprocess_tmp:
