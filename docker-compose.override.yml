# Override services to add preprocess_tmp volume
services:
  backend:
    volumes:
      - ./backend:/app
      - preprocess_tmp:/tmp/preprocess
    environment:
      - LITELLM_BASE_URL=http://litellm:4000

  celery-worker:
    volumes:
      - ./backend:/app
      - preprocess_tmp:/tmp/preprocess
    environment:
      - LITELLM_BASE_URL=http://litellm:4000

volumes:
  preprocess_tmp:
